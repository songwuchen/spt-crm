services:
  db:
    # pgvector/pgvector:pg16(同 PG16,glibc)——支持向量语义检索(知识库 embedding 列)。
    # prod 拉不通 Docker Hub,该镜像由 CI 从 docker.io 转推到私有 Harbor。
    # 从 postgres:16-alpine 切换为本镜像时数据卷可复用,但需 REINDEX(musl→glibc collation)。
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: spt_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    # 运营驾驶舱(BI)数据采集需要：对宿主/内网暴露 PG 端口（只读账号采集）
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # prod 拉不通 Docker Hub，redis 镜像走私有 Harbor（由 CI 从 docker.io 镜像转推），
  # 与 backend/frontend 同源，随 `docker compose pull ... redis` 一并拉取。
  redis:
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/spt-crm-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/spt_crm
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  worker:
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/spt-crm-backend:latest
    restart: unless-stopped
    command: ["python", "-m", "app.workers.outbox_worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/spt_crm
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  reminder:
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/spt-crm-backend:latest
    restart: unless-stopped
    command: ["python", "-m", "app.workers.reminder_worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/spt_crm
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/spt-crm-frontend:latest
    restart: unless-stopped
    ports:
      - "8010:80"
      - "8410:443"
    depends_on:
      - backend
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/fourier.net.cn/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/fourier.net.cn/privkey.pem:/etc/nginx/ssl/privkey.pem:ro

volumes:
  pgdata:
  uploads:
