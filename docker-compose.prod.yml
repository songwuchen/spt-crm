services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: spt_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    # 运营驾驶舱(BI)数据采集需要：对宿主/内网暴露 PG 端口（只读账号采集）
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # redis:7-alpine 来自 Docker Hub（与 db 的 postgres:16-alpine 同源）。首次 up 会拉取一次，
  # 之后本地缓存；例行部署的 `docker compose pull` 已排除 db/redis，避免每次重拉挂起。
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/spt-crm-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/spt_crm
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  worker:
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/spt-crm-backend:latest
    restart: unless-stopped
    command: ["python", "-m", "app.workers.outbox_worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/spt_crm
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  reminder:
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/spt-crm-backend:latest
    restart: unless-stopped
    command: ["python", "-m", "app.workers.reminder_worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/spt_crm
      REDIS_URL: redis://redis:6379/0
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: wmharbor.fourier.net.cn:39011/hengchao-dev/spt-crm-frontend:latest
    restart: unless-stopped
    ports:
      - "8010:80"
      - "8410:443"
    depends_on:
      - backend
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/fourier.net.cn/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/fourier.net.cn/privkey.pem:/etc/nginx/ssl/privkey.pem:ro

volumes:
  pgdata:
  uploads:
