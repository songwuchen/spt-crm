name: CI

# 流程：代码测试 → 构建镜像 → 推送至私有 Harbor。
# 推送完成即结束；生产拉镜像 / 迁移 / compose 升级由运维手动执行（见 deploy/deploy.sh）。

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  HARBOR_REGISTRY: wmharbor.fourier.net.cn:39011
  HARBOR_PROJECT: songwuchen
  BACKEND_IMAGE: wmharbor.fourier.net.cn:39011/songwuchen/spt-crm-backend
  FRONTEND_IMAGE: wmharbor.fourier.net.cn:39011/songwuchen/spt-crm-frontend

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spt_crm_test
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET_KEY: ci-test-secret
      AI_PROVIDER: mock
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:${{ job.services.postgres.ports[5432] }}/spt_crm_test
      - run: python -m scripts.seed
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:${{ job.services.postgres.ports[5432] }}/spt_crm_test
      - run: python -m pytest -x --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:${{ job.services.postgres.ports[5432] }}/spt_crm_test

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.HARBOR_REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build & push backend image
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:latest -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend
          docker push ${{ env.BACKEND_IMAGE }}:latest
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend image
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:latest -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # prod 无法访问 Docker Hub，把 redis 从 docker.io 转推到私有 Harbor，供 prod 拉取。
      - name: Mirror redis image into Harbor
        run: |
          docker pull redis:7-alpine
          docker tag redis:7-alpine ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/redis:7-alpine
          docker push ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/redis:7-alpine

      # 同理把 pgvector/pgvector:pg16 备到 Harbor，供向量知识库切换数据库镜像时拉取。
      # 注意: 该镜像仅入库备用，不改变 prod db 服务镜像; 切换是计划内的手动维护操作。
      - name: Mirror pgvector image into Harbor
        run: |
          docker pull pgvector/pgvector:pg16
          docker tag pgvector/pgvector:pg16 ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/pgvector:pg16
          docker push ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/pgvector:pg16
