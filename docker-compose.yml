version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spt_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/spt_crm
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_API_KEY: ${AI_API_KEY:-}
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  worker:
    build: ./backend
    command: ["python", "-m", "app.workers.outbox_worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/spt_crm
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  reminder:
    build: ./backend
    command: ["python", "-m", "app.workers.reminder_worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/spt_crm
      LOG_FORMAT: json
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
